appId: com.curso.shopdemo
env:
    PRODUCT_IN_CART: ${PRODUCT_IN_CART || "Fone de Ouvido Bluetooth"}
    PRODUCT_PRICE: ${PRODUCT_PRICE || "159,90"}
    TOTAL_CART: ${TOTAL_CART || "159,90"}
    NAME: ${NAME || "Test"}
    ADDRESS: ${ADDRESS || "Rua Test, 123"}
    CARD: ${CARD || "0000-1111-2222-3333"}
---
- scrollUntilVisible: 
    element: ${PRODUCT_IN_CART}
    direction: UP
- tapOn: ${PRODUCT_IN_CART}
- tapOn:
    id: "btn-adicionar"
- assertVisible: "Produto adicionado com sucesso!"
- tapOn:
    id: "btn-ver-carrinho"
- assertVisible: "R$ ${PRODUCT_PRICE}"
- assertVisible: "Total: R$ ${TOTAL_CART}"
- assertVisible:
    id: "btn-finalizar"
    enabled: true
- tapOn:
    id: "btn-finalizar"
- tapOn:
    id: "input-nome"
- inputText: ${NAME}
- tapOn:
    id: "input-endereco"
- inputText: ${ADDRESS}
- tapOn:
    id: "input-cartao"
- inputText: ${CARD}
- hideKeyboard
- tapOn:
    id: "btn-confirmar"
- assertVisible: "Pedido confirmado"
- assertVisible:
    id: "confirmacao-numero"
- assertVisible: "Pedido #.*"