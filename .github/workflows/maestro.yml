on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start emulator and run suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: '-no-window -gpu swiftshader_indirect -noaudio -no-boot-anim'
          disable-animations: true
          script: |
            adb install ShopDemo.apk
            mkdir -p reports
            maestro test --format junit --output reports/resultado.xml flows/s3-suite-shopdemo/

      - name: Publish JUnit report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: maestro-report
          path: reports/resultado.xml

      - name: Publish screenshots
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: maestro-screenshots
          path: .maestro/screenshots/

      - name: Display result in Actions
        uses: dorny/test-reporter@v1
        if: ${{ always() }}
        with:
          name: Maestro Suite
          path: reports/resultado.xml
          reporter: java-junit
          fail-on-error: false